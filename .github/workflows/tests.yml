name: Tests

on:
  push:
  pull_request:

jobs:
  check_no_legacy_graph:
    name: check:no_legacy_graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block removed module names
        run: |
          ! rg -n "amon\.taskgraph2|amon\.graph_runtime" src tests docs .github/workflows
      - name: Run anti-legacy graph scan
        run: scripts/anti_legacy_graph.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Validate all TaskGraph v3 fixtures/examples
        run: python scripts/validate_all_v3_graphs.py
      - name: Run tests
        run: pytest tests
